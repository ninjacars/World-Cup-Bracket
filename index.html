  // clean visual bracket: sort by the average display index of its feeders.

  var match = allRounds[roundIdx][matchIdx];
  if (match.winner !== null) {

// public-domain-clean, so for this prediction tool we use a stable one-to-one
// assignment: advancing groups (sorted) map to the 8 third-place slots in
// template order. This guarantees no duplicates and no missing teams — every
// advancing third appears exactly once. Returns slotKey -> letter.

  var letters = advancingLetters.slice().sort(); // canonical order
  var assignment = {};

      return letter ? (state.groupOrder[letter][2] + " (3rd, Gr " + letter + ")") : null;

  function base(n) { return n && n.indexOf(" (") >= 0 ? n.split(" (")[0] : n; }

  var usedFixture = [];
  state.rounds[0].forEach(function (m, i) {
    var r = resolved[i];

    // 1) Prefer the authoritative reference for this match id (real teams in the
    //    official bracket), so slots show the correct teams regardless of
    //    hardcoded group standings.
    var ref = R32_REFERENCE[m.id];
    if (ref) { a = ref[0]; b = ref[1]; }

    //    reference isn't available.

// feed's real fixtures when available. Once a round's real matchups are
// published, the feed is the source of truth for the FULL pairing (both teams),
// so we place complete fixtures into that round's slots — this fixes wrong
// bracket paths (e.g. two same-group teams meeting) that the template wiring or
// an opponent-only patch can't untangle. Slots are matched to fixtures by an

    var roundFix = koFixtures.filter(function (f) {
      if (!f.t1 || !f.t2) return false;
      return koRoundIndexFor(f) === rIdx;
    });
    if (!roundFix.length) continue;

    roundFix = roundFix.slice().sort(function (x, y) {
      return (x.sgt ? x.sgt.getTime() : 0) - (y.sgt ? y.sgt.getTime() : 0);

// bracket exactly like setWinner does. Returns true if anything changed.

  var rounds = state.rounds;

  function base(n) { return n && n.indexOf(" (") >= 0 ? n.split(" (")[0] : n; }

  for (var rIdx = 0; rIdx < rounds.length; rIdx++) {
    for (var mIdx = 0; mIdx < rounds[rIdx].length; mIdx++) {
      var match = rounds[rIdx][mIdx];
      if (!match.a || !match.b) continue; // both teams must be present to match
      var fix = koFixtureForSlot(rIdx, mIdx, match);
      if (!fix || !fix.score) continue;   // need a finished real fixture

      // a draw, use the penalty shootout result as the decider.

      else if (loserName === b) side = "a"; // loser is b → winner is a

      // it just changed), so the next-round slot shows the team even on

// the rest as null (shown as TBD). A group's 1st/2nd resolve once that group is

// Third-place slots resolve only once at least 8 groups are fully resolved, so
// the "8 best thirds" set is meaningful. Returns { r32, thirds, completeGroups }.

  // the advancing-thirds set as known once 8+ groups are complete (otherwise the
  // set could still change as more predictions come in).

  if (thirdsKnown) {

      return { letter: letter, r: standingsByGroup[letter][2] };

      if (q.r.gd !== p.r.gd) return q.r.gd - p.r.gd;

      return letter ? (standingsByGroup[letter][2].team + " (3rd, Gr " + letter + ")") : null;

// required); the rest are the openfootball JSON on GitHub's CDN, which is
// rock-solid but updated only about once a day. Each source has a parser that
// normalizes its response into a common "matches" array. If a source fails to

  // - GitHub's Contents API IS CORS-friendly and returns the LATEST commit's
  //   file (base64), bypassing CDN caches — best freshness for the GitHub data.

  // Order: live API first, then fresh GitHub API mirrors, then jsdelivr as a

  { url: "https://api.github.com/repos/upbound-web/worldcup-live.json/contents/2026/worldcup.json", parse: parseGithubApi, label: "community mirror (fresh)" },
  { url: "https://api.github.com/repos/openfootball/worldcup.json/contents/2026/worldcup.json", parse: parseGithubApi, label: "openfootball (fresh)" },
  { url: "https://cdn.jsdelivr.net/gh/upbound-web/worldcup-live.json@master/2026/worldcup.json", parse: parseOpenfootball, label: "community mirror (cached)" },

    return table[team];
  }
  fixtures.forEach(function (f) {
    if (!f.score) return;
    var a = ensure(f.t1), b = ensure(f.t2);
    var s1 = f.score[0], s2 = f.score[1];
    a.p++; b.p++; a.gf += s1; a.ga += s2; b.gf += s2; b.ga += s1;
    if (s1 > s2) { a.w++; b.l++; a.pts += 3; }
    else if (s2 > s1) { b.w++; a.l++; b.pts += 3; }
    else { a.d++; b.d++; a.pts += 1; b.pts += 1; }
  });
  var rows = order.map(function (t) { var r = table[t]; r.gd = r.gf - r.ga; return r; });
  rows.sort(function (x, y) {
    if (x.p === 0 && y.p === 0) return x.seed - y.seed;
    if (x.p === 0) return 1;
    if (y.p === 0) return -1;
    if (y.pts !== x.pts) return y.pts - x.pts;
    if (y.gd !== x.gd) return y.gd - x.gd;
    if (y.gf !== x.gf) return y.gf - x.gf;
    return x.seed - y.seed;
  });
  return rows;
}

// Returns a Set of team names that are CONFIRMED into the knockout stage based
// on REAL results only (not predictions): a group counts once all its real
// matches are played, and its 1st, 2nd, and 3rd-place finishers are confirmed
// qualifiers (3rd may or may not advance, but it's a real standing). Used to
// highlight locked-in teams on the manual Knockout bracket. Best-third
// selection across groups isn't decided until enough groups finish, so we mark
// 1st and 2nd as fully confirmed, and 3rd as "confirmed standing" too — all are
// real, non-hypothetical teams worth highlighting versus predicted slots.
function confirmedTeams() {
  var set = {};
  GROUP_LETTERS.forEach(function (letter) {
    var fixtures = groupFixtures[letter] || [];
    if (!fixtures.length) return;
    // Group is "finished" when every real match has a score.
    var allPlayed = fixtures.every(function (f) { return f.score != null; });
    if (!allPlayed) return;
    var standings = computeStandings(letter); // real results only
    // Need a full set of played matches to trust positions.
    if (!standings.every(function (r) { return r.p >= 3; })) return;
    // Top 2 are confirmed qualifiers; 3rd is a confirmed real standing.
    [0, 1, 2].forEach(function (i) { if (standings[i]) set[standings[i].team] = true; });
  });
  return set;
}

// Count completed matches in a normalized matches array — used to pick the
// freshest source (the one that has logged the most results).
function countPlayed(matches) {
  if (!matches) return 0;
  var n = 0;
  matches.forEach(function (m) {
    if (m && m.score && m.score.ft && typeof m.score.ft[0] === "number" && typeof m.score.ft[1] === "number") n++;
  });
  return n;
}

function fetchLiveResults() {
  liveStatus = "loading";
  liveMessage = "Fetching latest results…";
  render();

  // Query every source in parallel and keep the freshest usable response (the
  // one reporting the most completed matches). This avoids getting stuck on the
  // first source that merely "works" while a different source already has a
  // newer result. Each fetch independently succeeds or fails; we just need one.
  var results = [];
  var settled = 0;

  function finish() {
    if (settled < LIVE_SOURCES.length) return;
    if (!results.length) {
      liveStatus = "error";
      liveMessage = "Couldn't fetch results — keeping your manual picks. Try again later.";
      render();
      return;
    }
    // Pick the response with the most completed matches; tie-break by source
    // priority (earlier in LIVE_SOURCES = more trusted/live).
    results.sort(function (a, b) {
      if (b.played !== a.played) return b.played - a.played;
      return a.idx - b.idx;
    });
    var best = results[0];
    lastSourceLabel = best.label;
    applyLiveResults(best.matches);
  }

  LIVE_SOURCES.forEach(function (source, idx) {
    var url = source.url + (source.url.indexOf("?") >= 0 ? "&" : "?") + "t=" + Date.now(); // cache-bust
    fetch(url, { cache: "no-store" })
      .then(function (res) {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(function (data) {
        var matches = source.parse(data);
        if (!matches || !matches.length) throw new Error("unexpected data shape");
        results.push({ idx: idx, label: source.label, matches: matches, played: countPlayed(matches) });
      })
      .catch(function () { /* this source failed; others may still succeed */ })
      .then(function () { settled++; finish(); });
  });
}

function applyLiveResults(matches) {
  // Capture every group-stage fixture (played or not) for the schedule view.
  var fixtures = {};
  GROUP_LETTERS.forEach(function (l) { fixtures[l] = []; });
  // Also capture knockout-stage fixtures (matches with a round label but no
  // group), so the Schedule tab can show them as those fixtures get populated.
  var koFix = [];
  matches.forEach(function (m) {
    var groupLetter = m.group ? (m.group.match(/Group\s+([A-L])/i) || [])[1] : null;
    var played = m.score && m.score.ft && typeof m.score.ft[0] === "number" && typeof m.score.ft[1] === "number";
    // Penalty shootout score, if present (openfootball uses score.p:[a,b]).
    var pens = (m.score && m.score.p && typeof m.score.p[0] === "number" && typeof m.score.p[1] === "number")
      ? [m.score.p[0], m.score.p[1]] : null;

    if (groupLetter && fixtures[groupLetter]) {
      fixtures[groupLetter].push({
        t1: normalizeName(m.team1),
        t2: normalizeName(m.team2),
        score: played ? [m.score.ft[0], m.score.ft[1]] : null,
        ground: m.ground || "",
        sgt: toSGT(m.date, m.time),
        sortKey: (m.date || "") + " " + (m.time || "")
      });
      return;
    }

    // Knockout fixture: has a round label (e.g. "Round of 32", "Final") OR is a
    // non-group match with two real team names. Skip placeholder-only entries.
    var roundLabel = m.round || m.stage || "";
    var t1 = m.team1 ? normalizeName(m.team1) : "";
    var t2 = m.team2 ? normalizeName(m.team2) : "";
    var hasDate = !!(m.date && m.time);
    if ((roundLabel || (!m.group && (t1 || t2))) && hasDate) {
      koFix.push({
        round: roundLabel || "Knockout",
        t1: t1, t2: t2,
        score: played ? [m.score.ft[0], m.score.ft[1]] : null,
        pens: pens, // [a,b] penalty shootout result, or null
        ground: m.ground || "",
        sgt: toSGT(m.date, m.time),
        sortKey: (m.date || "") + " " + (m.time || "")
      });
    }
  });
  GROUP_LETTERS.forEach(function (l) {
    fixtures[l].sort(function (a, b) { return a.sortKey < b.sortKey ? -1 : a.sortKey > b.sortKey ? 1 : 0; });
  });
  koFix.sort(function (a, b) { return a.sortKey < b.sortKey ? -1 : a.sortKey > b.sortKey ? 1 : 0; });
  groupFixtures = fixtures;
  koFixtures = koFix;

  // Build per-group stats from played group-stage matches.
  var stats = {}; // team -> {pts, gf, ga, played}
  function ensure(team) {
    if (!stats[team]) stats[team] = { team: team, pts: 0, gf: 0, ga: 0, gd: 0, played: 0 };
    return stats[team];
  }

  var anyPlayed = false;
  matches.forEach(function (m) {
    if (!m.group) return;                       // only group-stage matches
    if (!m.score || !m.score.ft) return;        // only matches with a full-time score
    var t1 = normalizeName(m.team1);
    var t2 = normalizeName(m.team2);
    var s1 = m.score.ft[0], s2 = m.score.ft[1];
    if (typeof s1 !== "number" || typeof s2 !== "number") return;
    anyPlayed = true;
    var a = ensure(t1), b = ensure(t2);
    a.played++; b.played++;
    a.gf += s1; a.ga += s2;
    b.gf += s2; b.ga += s1;
    if (s1 > s2) { a.pts += 3; }
    else if (s2 > s1) { b.pts += 3; }
    else { a.pts += 1; b.pts += 1; }
  });

  if (!anyPlayed) {
    // Still useful: we captured the fixture schedule even with no results yet.
    liveStatus = "ok";
    liveMessage = "Schedule loaded " + nowTimeSGT() + " from " + (lastSourceLabel || "source") + ". No completed matches yet.";
    persist();
    render();
    return;
  }

  Object.keys(stats).forEach(function (t) { stats[t].gd = stats[t].gf - stats[t].ga; });

  // Re-sort each group by the fetched stats. Teams with no played matches
  // keep their existing relative order at the bottom.
  var updatedGroups = 0;
  GROUP_LETTERS.forEach(function (letter) {
    var teams = state.groupOrder[letter].slice();
    var hasData = teams.some(function (t) { return stats[t] && stats[t].played > 0; });
    if (!hasData) return;
    teams.sort(function (x, y) {
      var sx = stats[x] || { pts: -1, gd: 0, gf: 0 };
      var sy = stats[y] || { pts: -1, gd: 0, gf: 0 };
      if (sy.pts !== sx.pts) return sy.pts - sx.pts;
      if (sy.gd !== sx.gd) return sy.gd - sx.gd;
      return sy.gf - sx.gf;
    });
    state.groupOrder[letter] = teams;
    updatedGroups++;
  });

  // Auto-pick the 8 best third-placed teams across groups (standard format).
  var thirds = GROUP_LETTERS.map(function (letter) {
    var third = state.groupOrder[letter][2];
    return { letter: letter, s: stats[third] || { pts: -1, gd: 0, gf: 0, played: 0 } };
  }).filter(function (o) { return o.s.played > 0; });
  if (thirds.length >= 8) {
    thirds.sort(function (p, q) {
      if (q.s.pts !== p.s.pts) return q.s.pts - p.s.pts;
      if (q.s.gd !== p.s.gd) return q.s.gd - p.s.gd;
      return q.s.gf - p.s.gf;
    });
    state.advancingThirds = thirds.slice(0, 8).map(function (o) { return o.letter; });
  }

  state.rounds = buildInitialMatches(); // reset knockout to reflect new seeding
  liveStatus = "ok";
  liveMessage = "Updated " + nowTimeSGT() + " from " + (lastSourceLabel || "source") + " — " + updatedGroups + " group" + (updatedGroups === 1 ? "" : "s") + " with played matches.";
  persist();
  render();
}

// Current time as a short SGT clock string, e.g. "3:42pm".
function nowTimeSGT() {
  var d = new Date(Date.now() + 8 * 3600 * 1000);
  var hh = d.getUTCHours(), mm = d.getUTCMinutes();
  var ampm = hh >= 12 ? "pm" : "am";
  var h12 = hh % 12; if (h12 === 0) h12 = 12;
  return h12 + ":" + (mm < 10 ? "0" + mm : mm) + ampm + " SGT";
}

/* ---------------- DOM helpers ---------------- */
function el(tag, attrs, children) {
  var node = document.createElement(tag);
  attrs = attrs || {};
  Object.keys(attrs).forEach(function (key) {
    if (key === "style") {
      Object.assign(node.style, attrs.style);
    } else if (key === "onClick") {
      node.addEventListener("click", attrs.onClick);
    } else if (key === "className") {
      node.className = attrs.className;
    } else if (key === "disabled") {
      node.disabled = attrs.disabled;
    } else if (key === "text") {
      node.textContent = attrs.text;
    } else {
      node.setAttribute(key, attrs[key]);
    }
  });
  (children || []).forEach(function (c) {
    if (c == null) return;
    if (typeof c === "string") node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  });
  return node;
}

/* ---------------- Render: Schedule view ----------------
   Lists all fixtures grouped by match day (in Singapore time), with
   prev/next navigation and a row of day chips. Defaults to today, or the
   nearest upcoming match day if nothing is on today. */
function sgtTodayKey() {
  var nowSgt = new Date(Date.now() + 8 * 3600 * 1000);
  return nowSgt.getUTCFullYear() + "-" + (nowSgt.getUTCMonth() + 1) + "-" + nowSgt.getUTCDate();
}
function sgtDateKey(d) {
  if (!d) return null;
  return d.getUTCFullYear() + "-" + (d.getUTCMonth() + 1) + "-" + d.getUTCDate();
}
// Sortable key (zero-padded) so day strings order chronologically.
function sgtSortKey(d) {
  if (!d) return "9999-99-99";
  var mo = d.getUTCMonth() + 1, day = d.getUTCDate();
  return d.getUTCFullYear() + "-" + (mo < 10 ? "0" + mo : mo) + "-" + (day < 10 ? "0" + day : day);
}

function setScheduleDay(key) { state.scheduleDay = key; persist(); render(); }

// Shared "Fetch results & schedule" button + status message row.
function buildFetchRow() {
  var liveRow = el("div", { style: { display: "flex", alignItems: "center", gap: "12px", flexWrap: "wrap", marginBottom: "16px" } });
  var fetchBtn = el("button", {
    style: {
      display: "flex", alignItems: "center", gap: "6px",
      background: liveStatus === "loading" ? "rgba(244,241,232,0.1)" : "rgba(74,157,110,0.2)",
      border: "1px solid rgba(74,157,110,0.4)", color: "#f4f1e8",
      padding: "8px 14px", borderRadius: "6px", fontWeight: "600", fontSize: "13px",
      cursor: liveStatus === "loading" ? "default" : "pointer", opacity: liveStatus === "loading" ? "0.6" : "1"
    },
    disabled: liveStatus === "loading",
    onClick: function () { if (liveStatus !== "loading") fetchLiveResults(); },
    text: liveStatus === "loading" ? "⟳ Fetching…" : "⟳ Fetch results & schedule"
  });
  liveRow.appendChild(fetchBtn);
  if (liveMessage) {
    var msgColor = liveStatus === "ok" ? "rgba(74,157,110,0.95)" : liveStatus === "error" ? "rgba(230,179,37,0.95)" : "rgba(244,241,232,0.6)";
    liveRow.appendChild(el("span", { style: { fontSize: "12px", color: msgColor, flex: "1", minWidth: "180px" }, text: liveMessage }));
  }
  return liveRow;
}

function renderScheduleView() {
  var main = el("main", { className: "wrap", style: { padding: "24px 20px" } });

  // Fetch button + status at the top of the Schedule tab.
  main.appendChild(buildFetchRow());

  // Collect every fixture across groups, tagged with its group letter.
  var all = [];
  GROUP_LETTERS.forEach(function (letter) {
    (groupFixtures[letter] || []).forEach(function (f) {
      all.push({ f: f, letter: letter });
    });
  });
  // Fold in knockout-stage fixtures, tagged with their round label instead of a
  // group letter so the day view can label them (e.g. "Round of 32", "Final").
  koFixtures.forEach(function (f) {
    all.push({ f: f, letter: null, round: f.round });
  });

  // No data fetched yet
  if (!all.length) {
    main.appendChild(el("div", { style: { background: "rgba(244,241,232,0.05)", borderRadius: "12px", border: "1px solid rgba(244,241,232,0.1)", padding: "24px", textAlign: "center" } }, [
      el("p", { style: { fontSize: "15px", opacity: "0.75", margin: "0 0 6px" }, text: "No schedule loaded yet." }),
      el("p", { style: { fontSize: "13px", opacity: "0.5", margin: "0" }, text: "Tap \u201CFetch results & schedule\u201D above to load fixtures." })
    ]));
    return main;
  }

  // Build the ordered list of distinct match days.
  var dayMap = {}; // sortKey -> { sortKey, displayKey (sgtDateKey), sample Date }
  all.forEach(function (o) {
    if (!o.f.sgt) return;
    var sk = sgtSortKey(o.f.sgt);
    if (!dayMap[sk]) dayMap[sk] = { sortKey: sk, dateKey: sgtDateKey(o.f.sgt), date: o.f.sgt };
  });
  var days = Object.keys(dayMap).map(function (k) { return dayMap[k]; }).sort(function (a, b) { return a.sortKey < b.sortKey ? -1 : 1; });

  // Determine which day to show.
  var todayKey = sgtTodayKey();
  var selectedKey = state.scheduleDay;
  var selectedExists = selectedKey && days.some(function (d) { return d.dateKey === selectedKey; });
  if (!selectedExists) {
    // Default: today if it has matches, else the nearest upcoming match day, else the last day.
    var todayDay = days.find(function (d) { return d.dateKey === todayKey; });
    if (todayDay) {
      selectedKey = todayKey;
    } else {
      var todaySort = sgtSortKey(new Date(Date.now() + 8 * 3600 * 1000));
      var nextDay = days.find(function (d) { return d.sortKey >= todaySort; });
      selectedKey = (nextDay || days[days.length - 1]).dateKey;
    }
  }

  var selectedIdx = days.findIndex(function (d) { return d.dateKey === selectedKey; });
  var selectedDay = days[selectedIdx];

  // ----- Day navigation header -----
  var monthsLong = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  var daysLong = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
  var isToday = selectedDay.dateKey === todayKey;

  var navRow = el("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", gap: "10px", marginBottom: "14px" } });
  var prevBtn = el("button", {
    disabled: selectedIdx === 0,
    style: { width: "38px", height: "38px", borderRadius: "8px", fontSize: "18px", flexShrink: "0", background: "rgba(244,241,232,0.08)", color: "#f4f1e8", opacity: selectedIdx === 0 ? "0.25" : "1" },
    onClick: function () { if (selectedIdx > 0) setScheduleDay(days[selectedIdx - 1].dateKey); },
    text: "‹"
  });
  var dateLabel = el("div", { style: { textAlign: "center", flex: "1", minWidth: "0" } }, [
    el("div", { className: "display", style: { fontSize: "22px", lineHeight: "1.1" }, text: (isToday ? "TODAY · " : "") + daysLong[selectedDay.date.getUTCDay()] }),
    el("div", { className: "mono-f", style: { fontSize: "11px", opacity: "0.5", marginTop: "2px" }, text: selectedDay.date.getUTCDate() + " " + monthsLong[selectedDay.date.getUTCMonth()] + " " + selectedDay.date.getUTCFullYear() + " · SGT" })
  ]);
  var nextBtn = el("button", {
    disabled: selectedIdx === days.length - 1,
    style: { width: "38px", height: "38px", borderRadius: "8px", fontSize: "18px", flexShrink: "0", background: "rgba(244,241,232,0.08)", color: "#f4f1e8", opacity: selectedIdx === days.length - 1 ? "0.25" : "1" },
    onClick: function () { if (selectedIdx < days.length - 1) setScheduleDay(days[selectedIdx + 1].dateKey); },
    text: "›"
  });
  navRow.appendChild(prevBtn);
  navRow.appendChild(dateLabel);
  navRow.appendChild(nextBtn);
  main.appendChild(navRow);

  // ----- Day chips (quick jump) -----
  var monthsShort = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  var chipRow = el("div", { style: { display: "flex", gap: "6px", overflowX: "auto", paddingBottom: "8px", marginBottom: "18px" } });
  var activeChip = null;
  days.forEach(function (d) {
    var active = d.dateKey === selectedDay.dateKey;
    var dayIsToday = d.dateKey === todayKey;
    var chip = el("button", {
      style: { flexShrink: "0", minWidth: "52px", padding: "6px 10px", borderRadius: "8px", textAlign: "center",
        background: active ? "#e6b325" : "rgba(244,241,232,0.08)",
        color: active ? "#0b1f17" : "rgba(244,241,232,0.7)",
        border: dayIsToday && !active ? "1px solid rgba(230,179,37,0.5)" : "1px solid transparent" },
      onClick: function () { setScheduleDay(d.dateKey); }
    }, [
      el("div", { className: "mono-f", style: { fontSize: "9px", opacity: "0.7", textTransform: "uppercase" }, text: daysLong[d.date.getUTCDay()].slice(0, 3) }),
      el("div", { style: { fontSize: "15px", fontWeight: "700", lineHeight: "1.2" }, text: String(d.date.getUTCDate()) }),
      el("div", { className: "mono-f", style: { fontSize: "8px", opacity: "0.6", textTransform: "uppercase" }, text: monthsShort[d.date.getUTCMonth()] })
    ]);
    if (active) activeChip = chip;
    chipRow.appendChild(chip);
  });
  main.appendChild(chipRow);

  // After layout, scroll the chip strip so the selected day is centered/visible.
  // This fixes both the initial load (which otherwise sits at the first day) and
  // arrow navigation (so the strip follows the selected day). scrollIntoView is
  // more robust than manual scrollLeft math across re-renders. A double rAF
  // ensures the replaced DOM is laid out before we scroll.
  if (activeChip) {
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        try {
          if (activeChip.scrollIntoView) {
            activeChip.scrollIntoView({ inline: "center", block: "nearest" });
          } else {
            chipRow.scrollLeft = Math.max(0, activeChip.offsetLeft - chipRow.clientWidth / 2 + activeChip.offsetWidth / 2);
          }
        } catch (e) {
          try { chipRow.scrollLeft = Math.max(0, activeChip.offsetLeft - chipRow.clientWidth / 2); } catch (e2) {}
        }
      });
    });
  }

  // ----- Matches for the selected day -----
  var dayMatches = all.filter(function (o) { return sgtDateKey(o.f.sgt) === selectedDay.dateKey; });
  dayMatches.sort(function (a, b) { return (a.f.sgt ? a.f.sgt.getTime() : 0) - (b.f.sgt ? b.f.sgt.getTime() : 0); });

  var list = el("div", { style: { display: "flex", flexDirection: "column", gap: "8px" } });
  dayMatches.forEach(function (o) { list.appendChild(renderTodayFixture(o.f, o.letter, true)); });
  main.appendChild(list);

  // Small count footer
  main.appendChild(el("p", { className: "mono-f", style: { fontSize: "10px", opacity: "0.35", textAlign: "center", marginTop: "14px" }, text: dayMatches.length + " match" + (dayMatches.length === 1 ? "" : "es") + " · day " + (selectedIdx + 1) + " of " + days.length }));

  return main;
}

/* ---------------- Predictions (score predictions + simulated tables) ----------------
   Predictions are stored separately from live results and never touch the
   knockout bracket. Each fixture is keyed by group + both team names so the
   prediction survives re-fetching the schedule. */
function predKey(letter, t1, t2) {
  return letter + "|" + t1 + "|" + t2;
}

function setPrediction(letter, t1, t2, sideIdx, rawVal) {
  var key = predKey(letter, t1, t2);
  var cur = state.predictions[key] || { s1: null, s2: null };
  var v = rawVal === "" ? null : Math.max(0, Math.min(99, parseInt(rawVal, 10)));
  if (isNaN(v)) v = null;
  if (sideIdx === 0) cur.s1 = v; else cur.s2 = v;
  if (cur.s1 == null && cur.s2 == null) delete state.predictions[key];
  else state.predictions[key] = cur;
  persist();
  // Re-derive the predicted knockout seeding in the background so the Predict
  // KO tab is always current. seedPredictedKO() re-seeds the R32 and cascades
  // clears for any matchup that changed; it no-ops if predictions are still
  // incomplete, and only persists when something actually changed. We're on
  // the Predict tab here, so no re-render of the KO view is needed yet.
  seedPredictedKO();
  // No full re-render on each keystroke; the standings update via a lightweight refresh.
  refreshPredictStandings();
}

// Compute simulated standings for a group purely from predicted scores.
function computePredictedStandings(letter) {
  var fixtures = groupFixtures[letter] || [];
  var order = groupTeams(letter);
  var table = {};
  order.forEach(function (team, i) {
    table[team] = { team: team, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0, seed: i };
  });
  function ensure(team) {
    if (!table[team]) { table[team] = { team: team, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0, seed: 99 }; order.push(team); }
    return table[team];
  }
  fixtures.forEach(function (f) {
    // For concluded matches, use the real final score. Otherwise use the
    // prediction (only if both sides are entered).
    var s1, s2;
    if (f.score != null) {
      s1 = f.score[0]; s2 = f.score[1];
    } else {
      var pred = state.predictions[predKey(letter, f.t1, f.t2)];
      if (!pred || pred.s1 == null || pred.s2 == null) return;
      s1 = pred.s1; s2 = pred.s2;
    }
    var a = ensure(f.t1), b = ensure(f.t2);
    a.p++; b.p++; a.gf += s1; a.ga += s2; b.gf += s2; b.ga += s1;
    if (s1 > s2) { a.w++; b.l++; a.pts += 3; }
    else if (s2 > s1) { b.w++; a.l++; b.pts += 3; }
    else { a.d++; b.d++; a.pts += 1; b.pts += 1; }
  });
  var rows = order.map(function (t) { var r = table[t]; r.gd = r.gf - r.ga; return r; });
  rows.sort(function (x, y) {
    if (x.p === 0 && y.p === 0) return x.seed - y.seed;
    if (x.p === 0) return 1;
    if (y.p === 0) return -1;
    if (y.pts !== x.pts) return y.pts - x.pts;
    if (y.gd !== x.gd) return y.gd - x.gd;
    if (y.gf !== x.gf) return y.gf - x.gf;
    return x.seed - y.seed;
  });
  return rows;
}

function setThirdsMode(mode) { state.thirdsMode = mode; persist(); render(); }

function renderThirdsView() {

    var third = standings[2];

      background: advancing ? "rgba(74,157,110,0.14)" : "rgba(244,241,232,0.03)",

    var teamCell = el("span", { style: { flex: "1", minWidth: "0", display: "flex", alignItems: "center", gap: "7px", overflow: "hidden" } });
    var flagNode = flagFor(o.r.team);

    teamCell.appendChild(el("span", { style: { overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", fontWeight: advancing ? "600" : "400" }, text: o.r.team }));
    row.appendChild(teamCell);

/* ---------------- Bracket geometry ---------------- */
var CARD_H = 88;     // measured rendered height of a card (kickoff row + 2 team rows)
var GAP0 = 14;        // vertical gap between adjacent round-of-32 cards
var COL_W = 210;      // width of each round's card column
var COL_GAP = 40;     // horizontal gap between columns (line-routing space)

// Set during a render pass: team names confirmed via real results (manual
// bracket only). renderTeamRow reads this to highlight locked-in qualifiers.
var renderConfirmedSet = {};

function computeLayout() {
  var roundSizes = [16, 8, 4, 2, 1];
  var positions = [];

  var r0 = [];
  for (var i = 0; i < roundSizes[0]; i++) {
    r0.push({ top: i * (CARD_H + GAP0), height: CARD_H });
  }
  positions.push(r0);

  for (var r = 1; r < roundSizes.length; r++) {
    var prev = positions[r - 1];
    var cur = [];
    for (var i = 0; i < roundSizes[r]; i++) {
      var topA = prev[i * 2].top + prev[i * 2].height / 2;
      var topB = prev[i * 2 + 1].top + prev[i * 2 + 1].height / 2;
      var mid = (topA + topB) / 2 - CARD_H / 2;
      cur.push({ top: mid, height: CARD_H });
    }
    positions.push(cur);
  }
  return positions;
}

/* ---------------- Render: Bracket view ---------------- */
function renderBracketView(which) {
  which = which || "manual";
  var isKO = which === "ko";

  if (isKO) {
    renderConfirmedSet = {}; // predicted bracket: nothing is "confirmed by real results"
    return renderPredictedKOView();
  }

  // The knockout bracket no longer marks "qualified via group" on teams — all
  // R32 teams are real qualified sides, so the marker was redundant and, shown on
  // both teams of an unplayed match, looked like both had won. Meaningful state
  // is conveyed by the lock (real result) and the winner highlight instead.
  renderConfirmedSet = {};

  syncR32IntoRounds();
  syncRealKORounds();                     // fix R16+ matchups from real fixtures
  if (applyRealKOResults()) persist();     // auto-advance & lock real knockout winners
  syncRealKORounds();                     // re-apply after results advance teams
  var rounds = state.rounds;
  var finalMatch = rounds[4][0];
  var champion = finalMatch.winner === "a" ? finalMatch.a : finalMatch.winner === "b" ? finalMatch.b : null;

  var main = el("main", { style: { padding: "24px 12px" } });

  var topRow = el("div", { className: "wrap", style: { display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "12px", marginBottom: "12px" } });
  topRow.appendChild(el("p", { style: { fontSize: "14px", opacity: "0.6", margin: "0" }, text: "Tap a team to advance them; tap the winner again to deselect. Scroll sideways to follow the bracket to the final." }));
  topRow.appendChild(el("button", { style: { fontSize: "12px", opacity: "0.5", whiteSpace: "nowrap" }, onClick: resetBracket, text: "↺ Clear picks" }));
  main.appendChild(topRow);

  // Legend for the confirmed highlight (only meaningful once a group has finished).
  if (Object.keys(renderConfirmedSet).length) {
    var legend = el("div", { className: "wrap", style: { display: "flex", alignItems: "center", gap: "8px", marginBottom: "16px" } }, [
      el("span", { style: { display: "inline-block", width: "10px", height: "10px", borderRadius: "2px", background: "#3f7d5c", border: "1px solid #5bbd8a", flexShrink: "0" } }),
      el("span", { style: { fontSize: "12px", opacity: "0.6" }, text: "Qualified via real results (group finished)" })
    ]);
    main.appendChild(legend);
  }

  if (champion) {
    var champBox = el("div", { className: "wrap", style: { marginBottom: "22px", borderRadius: "12px", background: "linear-gradient(to right, rgba(230,179,37,0.2), rgba(230,179,37,0.05))", border: "1px solid rgba(230,179,37,0.4)", padding: "16px 20px", display: "flex", alignItems: "center", gap: "12px" } });
    champBox.appendChild(el("span", { style: { fontSize: "26px" }, text: "🏆" }));
    var champText = el("div", {}, [
      el("p", { className: "mono-f", style: { fontSize: "10px", textTransform: "uppercase", letterSpacing: "1px", color: "rgba(230,179,37,0.8)", margin: "0" }, text: "2026 World Champion" }),
      el("p", { className: "display", style: { fontSize: "24px", margin: "0" }, text: champion })
    ]);
    champBox.appendChild(champText);
    main.appendChild(champBox);
  }

  main.appendChild(buildBracketCanvas(rounds, which));
  return main;

// Builds the scrollable bracket canvas (headers, connector lines, cards) for
// the given rounds array. Shared by the manual and predicted brackets.
function buildBracketCanvas(rounds, which) {
  var layout = computeLayout();
  var totalHeight = layout[0][layout[0].length - 1].top + CARD_H;
  var totalWidth = layout.length * (COL_W + COL_GAP) - COL_GAP;

  var scrollWrap = el("div", { style: { overflowX: "auto", paddingBottom: "16px" } });
  var canvas = el("div", { style: { position: "relative", width: totalWidth + "px", height: (totalHeight + 28) + "px" } });

  layout.forEach(function (round, rIdx) {
    var headerLeft = rIdx * (COL_W + COL_GAP);
    canvas.appendChild(el("h3", {
      className: "mono-f",
      style: {
        position: "absolute", left: headerLeft + "px", top: "0px", width: COL_W + "px",
        textAlign: "center", fontSize: "11px", textTransform: "uppercase", letterSpacing: "1px", opacity: "0.45", margin: "0"
      },
      text: ROUND_LABELS[rIdx]
    }));
  });

  var svgNs = "http://www.w3.org/2000/svg";
  var svg = document.createElementNS(svgNs, "svg");
  svg.setAttribute("width", String(totalWidth));
  svg.setAttribute("height", String(totalHeight + 28));
  svg.style.position = "absolute";
  svg.style.left = "0";
  svg.style.top = "28px";
  svg.style.pointerEvents = "none";

  for (var rIdx = 0; rIdx < layout.length - 1; rIdx++) {
    var round = layout[rIdx];
    var nextRound = layout[rIdx + 1];
    var colLeft = rIdx * (COL_W + COL_GAP);
    var nextColLeft = (rIdx + 1) * (COL_W + COL_GAP);
    var midX = colLeft + COL_W + COL_GAP / 2;

    for (var i = 0; i < round.length; i += 2) {
      var topA = round[i].top + round[i].height / 2;
      var topB = round[i + 1].top + round[i + 1].height / 2;
      var parentTop = nextRound[i / 2].top + nextRound[i / 2].height / 2;
      appendLine(svg, colLeft + COL_W, topA, midX, topA);
      appendLine(svg, colLeft + COL_W, topB, midX, topB);
      appendLine(svg, midX, topA, midX, topB);
      appendLine(svg, midX, parentTop, nextColLeft, parentTop);
    }
  }
  canvas.appendChild(svg);

  layout.forEach(function (roundLayout, rIdx) {
    var colLeft = rIdx * (COL_W + COL_GAP);
    rounds[rIdx].forEach(function (match, mIdx) {
      var pos = roundLayout[mIdx];
      var card = renderMatchCard(match, rIdx, mIdx, which);
      card.style.position = "absolute";
      card.style.left = colLeft + "px";
      card.style.top = (pos.top + 28) + "px";
      card.style.width = COL_W + "px";
      canvas.appendChild(card);
    });
  });

  scrollWrap.appendChild(canvas);
  return scrollWrap;
}

// The predicted knockout view: auto-seeded (best-effort) from the simulated
// group tables. Resolved slots fill in; unresolved ones show TBD. User taps
// winners through to a predicted champion.
function renderPredictedKOView() {
  var main = el("main", { style: { padding: "24px 12px" } });

  // If no fixtures have been loaded at all, there's nothing to seed from.
  var hasFixtures = GROUP_LETTERS.some(function (l) { return (groupFixtures[l] || []).length; });

    main.appendChild(el("div", { className: "wrap", style: { background: "rgba(244,241,232,0.05)", borderRadius: "12px", border: "1px solid rgba(244,241,232,0.1)", padding: "24px", textAlign: "center" } }, [
      el("p", { style: { fontSize: "15px", opacity: "0.8", margin: "0 0 8px" }, text: "No fixtures loaded yet." }),
      el("p", { style: { fontSize: "13px", opacity: "0.55", margin: "0" }, text: "Tap \u201CFetch results & schedule\u201D on the Schedule tab, then predict scores on the Predict tab. The bracket fills in as groups resolve." })
    ]));
    return main;
  }

  seedPredictedKO(); // best-effort: fills what it can, leaves the rest TBD
  syncRealKORoundsFor(state.koRounds); // override R16+ from real fixtures when available

  var seeding = predictedSeeding();
  var completeGroups = seeding.completeGroups;

  var rounds = state.koRounds;
  var finalMatch = rounds[4][0];
  var champion = finalMatch.winner === "a" ? finalMatch.a : finalMatch.winner === "b" ? finalMatch.b : null;

  var topRow = el("div", { className: "wrap", style: { display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "12px", marginBottom: "14px" } });
  topRow.appendChild(el("p", { style: { fontSize: "14px", opacity: "0.6", margin: "0" }, text: "Auto-seeded from your predicted group tables. Tap a team to advance them through to your predicted champion." }));
  topRow.appendChild(el("button", { style: { fontSize: "12px", opacity: "0.5", whiteSpace: "nowrap" }, onClick: resetPredictedKO, text: "↺ Clear picks" }));
  main.appendChild(topRow);

  // Progress banner while groups are still incomplete.
  if (completeGroups < 12) {
    var incomplete = GROUP_LETTERS.filter(function (letter) {
      return !computePredictedStandings(letter).every(function (r) { return r.p >= 3; });
    });
    var note = completeGroups < 8
      ? "Slots fill in as groups finish. Third-place spots appear once 8 groups are fully resolved (" + completeGroups + "/8 so far)."
      : "Group winners and runners-up are seeded. Remaining slots fill in as the last groups finish.";
    main.appendChild(el("div", { className: "wrap", style: { background: "rgba(230,179,37,0.08)", border: "1px solid rgba(230,179,37,0.25)", borderRadius: "10px", padding: "12px 14px", marginBottom: "18px" } }, [
      el("p", { style: { fontSize: "13px", opacity: "0.85", margin: "0 0 4px" }, text: note }),
      el("p", { className: "mono-f", style: { fontSize: "11px", opacity: "0.55", margin: "0" }, text: incomplete.length + " group" + (incomplete.length === 1 ? "" : "s") + " still to finish: " + incomplete.join(", ") })
    ]));
  }

  if (champion) {
    var champBox = el("div", { className: "wrap", style: { marginBottom: "22px", borderRadius: "12px", background: "linear-gradient(to right, rgba(230,179,37,0.2), rgba(230,179,37,0.05))", border: "1px solid rgba(230,179,37,0.4)", padding: "16px 20px", display: "flex", alignItems: "center", gap: "12px" } });
    champBox.appendChild(el("span", { style: { fontSize: "26px" }, text: "🏆" }));
    champBox.appendChild(el("div", {}, [
      el("p", { className: "mono-f", style: { fontSize: "10px", textTransform: "uppercase", letterSpacing: "1px", color: "rgba(230,179,37,0.8)", margin: "0" }, text: "Your predicted champion" }),
      el("p", { className: "display", style: { fontSize: "24px", margin: "0" }, text: champion })
    ]));
    main.appendChild(champBox);
  }

  main.appendChild(buildBracketCanvas(rounds, "ko"));
  return main;
}

function appendLine(svg, x1, y1, x2, y2) {
  var ns = "http://www.w3.org/2000/svg";
  var line = document.createElementNS(ns, "line");
  line.setAttribute("x1", String(x1));
  line.setAttribute("y1", String(y1));
  line.setAttribute("x2", String(x2));
  line.setAttribute("y2", String(y2));
  line.setAttribute("stroke", "rgba(244,241,232,0.25)");
  line.setAttribute("stroke-width", "1.5");
  svg.appendChild(line);
}

// Find the knockout fixture from the feed that corresponds to a bracket slot.
// Matches by team names first (reliable once teams are known), else by the
// round's fixtures in kickoff order, indexed by slot. Returns the fixture or null.
function koFixtureForSlot(rIdx, mIdx, match) {
  if (!koFixtures.length) return null;
  var inRound = koFixtures.filter(function (f) { return koRoundIndexFor(f) === rIdx; });
  if (!inRound.length) return null;

  function base(n) { return n && n.indexOf(" (") >= 0 ? n.split(" (")[0] : n; }
  var a = base(match.a), b = base(match.b);

  // 1) Best: a fixture whose two teams are exactly this slot's two teams.
  if (a && b) {
    var both = inRound.find(function (f) {
      return (f.t1 === a && f.t2 === b) || (f.t1 === b && f.t2 === a);
    });
    if (both) return both;
  }

  // 2) Fallback: a fixture that contains EITHER of this slot's teams. Feed team
  //    names can differ slightly from our seeded names (e.g. spelling variants),
  //    so requiring both to match can miss a real result. Matching on one team
  //    is safe here because within a single knockout round a given team appears
  //    in exactly one fixture.
  var byOne = inRound.find(function (f) {
    return (a && (f.t1 === a || f.t2 === a)) || (b && (f.t1 === b || f.t2 === b));
  });
  return byOne || null;
}

// Kickoff (SGT Date) for a slot, for display on the card.
function koKickoffForSlot(rIdx, mIdx, match) {
  var f = koFixtureForSlot(rIdx, mIdx, match);
  return f && f.sgt ? f.sgt : null;
}

function renderMatchCard(match, rIdx, mIdx, which) {
  var aName = match.a || match.aLabel || "TBD";
  var bName = match.b || match.bLabel || "TBD";
  var aReady = !!match.a;
  var bReady = !!match.b;
  var locked = which === "manual" && koLocked[rIdx + ":" + mIdx];

  var card = el("div", { style: { borderRadius: "8px", border: "1px solid " + (locked ? "rgba(74,157,110,0.4)" : "rgba(244,241,232,0.15)"), background: "rgba(244,241,232,0.05)", overflow: "hidden" } });

  // Kickoff/result line. When the slot is locked by a real result, show the
  // final score; otherwise show the kickoff time (or blank to keep height).
  var kickoff = koKickoffForSlot(rIdx, mIdx, match);
  var fix = locked ? koFixtureForSlot(rIdx, mIdx, match) : null;
  var lineText, lineColor;
  if (locked && fix && fix.score) {
    lineText = "Final · " + fix.score[0] + "\u2013" + fix.score[1];
    if (fix.pens) lineText += " (pens " + fix.pens[0] + "\u2013" + fix.pens[1] + ")";
    lineColor = "rgba(74,157,110,0.9)";
  } else if (kickoff) {
    lineText = fmtKickoffShort(kickoff) + " SGT";
    lineColor = "rgba(244,241,232,0.55)";
  } else {
    lineText = "\u00b7";
    lineColor = "rgba(244,241,232,0)";
  }
  card.appendChild(el("div", {
    className: "mono-f",
    style: { fontSize: "9px", letterSpacing: "0.3px", color: lineColor, height: "13px", lineHeight: "13px", padding: "3px 8px 2px", textAlign: "center", borderBottom: "1px solid rgba(244,241,232,0.08)" },
    text: lineText
  }));

  // Locked slots aren't tappable — the real result stands.
  var aClick = locked ? function () {} : function () { if (aReady) setWinner(rIdx, mIdx, "a", which); };
  var bClick = locked ? function () {} : function () { if (bReady) setWinner(rIdx, mIdx, "b", which); };
  card.appendChild(renderTeamRow(aName, aReady && !locked, match.winner === "a", match.winner === "b", aClick, locked && match.winner === "a"));
  card.appendChild(el("div", { style: { height: "1px", background: "rgba(244,241,232,0.1)" } }));
  card.appendChild(renderTeamRow(bName, bReady && !locked, match.winner === "b", match.winner === "a", bClick, locked && match.winner === "b"));
  return card;
}

// Compact kickoff like "29 Jun · 1:00am" (SGT baked into the Date's UTC fields).
function fmtKickoffShort(d) {
  if (!d) return "";
  var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  var hh = d.getUTCHours(), mm = d.getUTCMinutes();
  var ampm = hh >= 12 ? "pm" : "am";
  var h12 = hh % 12; if (h12 === 0) h12 = 12;
  return d.getUTCDate() + " " + months[d.getUTCMonth()] + " · " + h12 + ":" + (mm < 10 ? "0" + mm : mm) + ampm;
}

function renderTeamRow(name, ready, isWinner, isLoser, onClick, lockedWinner) {
  // A team is "confirmed" if its base name (minus any "(3rd, Gr X)" suffix) is
  // in the current confirmed set. Only the unpicked, ready rows show the accent
  // so it doesn't fight with the winner/loser styling.
  var baseName = name && name.indexOf(" (") >= 0 ? name.split(" (")[0] : name;
  var isConfirmed = ready && !!renderConfirmedSet[baseName];

  var style = {
    width: "100%", textAlign: "left", padding: "10px 12px", fontSize: "14px", display: "flex", alignItems: "center", gap: "8px",
    cursor: (ready && !lockedWinner) ? "pointer" : "default"
  };
  if (isWinner) { style.background = "rgba(74,157,110,0.25)"; style.fontWeight = "600"; }
  else if (isLoser) { style.opacity = "0.35"; style.textDecoration = "line-through"; }
  else if (isConfirmed) { style.background = "rgba(63,125,92,0.22)"; style.opacity = "1"; style.boxShadow = "inset 3px 0 0 #5bbd8a"; }
  else if (ready) { style.opacity = "0.9"; }
  else { style.opacity = "0.3"; style.fontStyle = "italic"; }

  var btn = el("button", { style: style, disabled: !ready && !lockedWinner, onClick: onClick });
  if (isWinner) btn.appendChild(el("span", { style: { color: "#4a9d6e", fontSize: "11px" }, text: "●" }));
  var flagNode = flagFor(name);
  if (flagNode) btn.appendChild(flagNode);
  btn.appendChild(el("span", { style: { overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: "1" }, text: name }));
  if (isConfirmed && !isWinner) btn.appendChild(el("span", { title: "Qualified via real results", style: { color: "#5bbd8a", fontSize: "11px", flexShrink: "0", marginLeft: "4px" }, text: "✓" }));
  // Locked real winner shows a lock; an editable picked winner shows the deselect ✕.
  if (lockedWinner) btn.appendChild(el("span", { title: "Confirmed by real result", style: { color: "#5bbd8a", fontSize: "11px", flexShrink: "0", marginLeft: "4px" }, text: "🔒" }));
  else if (isWinner) btn.appendChild(el("span", { style: { color: "rgba(244,241,232,0.45)", fontSize: "13px", flexShrink: "0", marginLeft: "4px" }, text: "✕" }));
  return btn;
}

/* ---------------- Main render ---------------- */
function render() {
  var root = document.getElementById("root");
  root.innerHTML = "";
  root.appendChild(renderHeader());
  root.appendChild(
    state.view === "schedule" ? renderScheduleView() :
    state.view === "groups" ? renderGroupsView() :
    state.view === "thirds" ? renderThirdsView() :
    state.view === "predict" ? renderPredictView() :
    state.view === "predictko" ? renderBracketView("ko") :
    renderBracketView("manual")
  );
  root.appendChild(el("footer", { style: { textAlign: "center", fontSize: "10px", opacity: "0.3", padding: "24px 0", fontFamily: "monospace" }, text: "Your picks save automatically on this device." }));
}

render();
</script>
</body>
</html>
